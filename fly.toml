app = 'schedule-manage-bot'
primary_region = 'nrt'

[build]

[env]
  NODE_ENV = 'production'
  TZ = 'Asia/Tokyo'

[[mounts]]
  source = 'schedule_bot_data'
  destination = '/app/data'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpus = 1
  memory_mb = 256
